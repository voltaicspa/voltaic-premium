<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente IA - Voltaic</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 600px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #chat-header { background: #004a99; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2em; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 18px; max-width: 80%; line-height: 1.4; font-size: 0.95em; }
        .user { background: #004a99; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: #e9e9eb; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        #input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { background: #004a99; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #003366; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .loading { font-size: 0.8em; color: #888; font-style: italic; margin-left: 20px; display: none; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">Voltaic IA Business Agent</div>
    <div id="messages">
        <div class="message bot">¡Hola! Soy el asistente de Voltaic. ¿Qué tipo de negocio tienes para contarte cómo podemos automatizarlo?</div>
    </div>
    <div id="loading" class="loading">Gemma está pensando...</div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Escribe tu mensaje..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
    // TU URL DE NGROK ACTUALIZADA
    const N8N_WEBHOOK_URL = 'https://penitently-unremissible-freeman.ngrok-free.dev/webhook/voltaic-chat';

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const messages = document.getElementById('messages');
        const loading = document.getElementById('loading');
        const btn = document.getElementById('sendBtn');
        const text = input.value.trim();

        if (!text) return;

        // Mostrar mensaje del usuario
        appendMessage('user', text);
        input.value = '';
        
        // Bloquear UI mientras la GPU procesa
        loading.style.display = 'block';
        btn.disabled = true;

        try {
            const response = await fetch(N8N_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensaje: text })
            });

            const data = await response.json();
            
            // n8n devuelve un array o un objeto dependiendo de la config.
            // Extraemos el texto de la respuesta de la IA
            const botResponse = data.text || data[0].text || "Lo siento, tuve un problema al procesar la respuesta.";
            appendMessage('bot', botResponse);

        } catch (error) {
            console.error('Error:', error);
            appendMessage('bot', 'Error de conexión con el servidor local.');
        } finally {
            loading.style.display = 'none';
            btn.disabled = false;
            messages.scrollTop = messages.scrollHeight;
        }
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerText = text;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }
</script>

</body>
</html>
